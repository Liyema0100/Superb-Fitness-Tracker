<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Superb Fitness Tracker
    </title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <header>
        <h1>
            Home of Superb
        </h1>
        <nav>
            <ul class = "nav_links">
                <li>
                    <a href = "index.html">Home</a>
                </li>
                <li>
                    <a href = "analytics.html">Analytics</a>
                </li>
                <li>
                    <a href = "challenges.html">Challenges</a>
                </li>
            </ul>
        </nav>
    </header>
    <main class = "container">
        <section class = "hero-card">
            <h2>
            Welcome To Your Fitness Center
        </h2>
        <p>
            Log your daily routines, monitor key metrics and optimise your fitness growth.
        </p>
        </section>

        <div class = "grid-layout">
            <section class = "card">
                <h3>
                    Record Your Activity
                </h3>
                <form id = "workout-form">
                    <div class = "form-group">
                        <label for = "workout-type">
                            Activity Type
                        </label>
                        <select id = "workout-type" required>
                            <option value = "">
                                Select Activity
                            </option>
                            <option value = "Running">
                                Running
                            </option>
                            <option value = "Cycling">
                                Cycling
                            </option>
                            <option value = "Strength Training">
                                Strength Training
                            </option>
                            <option value = "Yoga">
                                Yoga
                            </option>
                            <option value = "Swimming">
                                Swimming
                            </option>
                            <option value = "Pilates">
                                Pilates
                            </option>
                            <option value = "HIIT">
                                HIIT
                            </option>
                        </select>
                    </div>

                    <div class = "form-group">
                        <label for = "workout-duration">
                            Duration (minutes)
                        </label>
                        <input type = "number" id = "workout-duration" min = "1" placeholder = "e.g. 45" required>
                    </div>

                    <div class = "form-group">
                        <label for = "workout-calories">
                            Energy Used(kcal)
                        </label>
                        <input type = "number" id = "workout-calories" min = "1" placeholder = "e.g. 350" required>
                    </div>

                    <div class = "form-group">
                        <label for = "workout-date">
                            Date
                        </label>
                        <input type = "date" id = "workout-date" required>
                    </div>
                    <button type = "submit" class = "btn-primary">
                        Log Workout Activity
                    </button>
                </form>
            </section>

            <section class = "card">
                <h3>
                    Your Recent Activities
                </h3>
                <div class = "activity-list">
                    <button id = "print-list" class = "btn-secondary">
                        Print Activity List
                    </button>
                    <button id = "clear-list" class = "btn-danger">
                        Clear Activity List
                    </button>
                </div>
                <ul id = "activity-list" class = "acticity-list">
                </ul>
            </section>
        </div>
    </main>
    <script src = "app.js">
    </script>
</body>
</html>
